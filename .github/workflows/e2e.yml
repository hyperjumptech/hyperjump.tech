name: E2E Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chromium
            shardIndex: 1
            shardTotal: 2
          - browser: chromium
            shardIndex: 2
            shardTotal: 2
          - browser: firefox
            shardIndex: 1
            shardTotal: 2
          - browser: firefox
            shardIndex: 2
            shardTotal: 2
          # WebKit is consistently slower; split into more shards so no single job dominates.
          - browser: webkit
            shardIndex: 1
            shardTotal: 3
          - browser: webkit
            shardIndex: 2
            shardTotal: 3
          - browser: webkit
            shardIndex: 3
            shardTotal: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          # Cache per-browser to avoid cross-job races and partial caches
          # when matrix runs in parallel.
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ hashFiles('bun.lock') }}

      - name: Install Playwright browsers
        run: bunx playwright install ${{ matrix.browser }} --with-deps

      - name: Build app
        run: bun run build

      - name: Run E2E tests (headless)
        env:
          CI: true
          E2E_BROWSERS: ${{ matrix.browser }}
        run: bun run test:e2e -- --project=${{ matrix.browser }} --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Playwright blob report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-blob-${{ matrix.browser }}-${{ matrix.shardIndex }}of${{ matrix.shardTotal }}
          path: blob-report/
          if-no-files-found: ignore

  e2e_report:
    name: Merge Playwright report
    runs-on: ubuntu-latest
    if: always()
    needs: [e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun install + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all blob reports
        uses: actions/download-artifact@v6
        with:
          pattern: playwright-blob-*
          path: playwright-blobs
          merge-multiple: true

      - name: Merge HTML report
        run: bunx playwright merge-reports --reporter=html playwright-blobs

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
